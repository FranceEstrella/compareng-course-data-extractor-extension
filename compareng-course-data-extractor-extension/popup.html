<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Tracker Extension</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    html, body {
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #003366, #006699);
  color: #fff;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background-color: rgba(255, 255, 255, 0.1);
  padding: 24px 20px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  text-align: center;
  width: 360px;
  box-sizing: border-box;
  border: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  flex-direction: column;
  align-items: center;
}

#logo {
  width: 72px;
  height: 72px;
  margin-bottom: 16px;
}

#logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
}

h1 {
  font-size: 18px;
  font-weight: 600;
  margin: 0 0 12px 0;
}

#status {
  font-size: 14px;
  font-weight: 500;
  color: #90ee90;
  margin-bottom: 20px;
}

.loader {
  border: 4px solid rgba(255, 255, 255, 0.3);
  border-top: 4px solid #4CAF50;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  margin-bottom: 16px;
  animation: spin 2s linear infinite;
  display: none;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#button-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}

.button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  border-radius: 6px;
  background-color: rgba(255, 255, 255, 0.2);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
  font-size: 14px;
  text-decoration: none;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
  transition: background-color 0.3s ease;
  width: 100%;
  box-sizing: border-box;
}

.button:hover {
  background-color: rgba(255, 255, 255, 0.3);
}

.button-icon {
  margin-right: 8px;
  width: 18px;
  height: 18px;
  object-fit: contain;
}
  </style>
</head>
<body>
  <div class="container">
    <div id="logo">
      <img src="images/default_icon.png" alt="App Logo" />
    </div>
    <h1>ComParEng Course Data Extractor</h1>
    <div class="loader" id="loader"></div>
    <p id="status">Running in the background...</p>
    <div id="button-container">
      <a id="launch-tools" href="https://compareng-coursetracker.vercel.app" class="button" target="_blank">
        <img src="images/default_icon.png" alt="Tools" class="button-icon" />
        Launch Tools App
      </a>
      <a id="student-portal" href="https://solar.feutech.edu.ph/" class="button" target="_blank">
        <img src="images/default_icon.png" alt="Portal" class="button-icon" />
        Student Portal
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
